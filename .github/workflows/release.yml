name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-zip:
    name: Build Release Zip
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get tag name
        id: tag
        run: echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build plugin zip
        run: |
          mkdir -p dist/wp-plugin-databench
          cp wp-databench.php uninstall.php README.md dist/wp-plugin-databench/
          cp -r includes assets templates dist/wp-plugin-databench/
          cd dist
          zip -r "../wp-plugin-databench-${{ steps.tag.outputs.name }}.zip" wp-plugin-databench/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: wp-plugin-databench-${{ steps.tag.outputs.name }}.zip
          generate_release_notes: true
