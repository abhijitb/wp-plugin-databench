# Builds a distributable plugin zip and attaches it to a GitHub Release
# whenever a v*.*.* tag is pushed.
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-zip:
    name: Build Release Zip
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get tag name
        id: tag
        run: |
          echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build plugin zip
        run: |
          mkdir -p dist/wp-databench
          cp wp-databench.php uninstall.php readme.txt README.md dist/wp-databench/
          cp -r includes assets templates languages dist/wp-databench/
          cd dist
          zip -r "../wp-databench.${{ steps.tag.outputs.version }}.zip" wp-databench/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: wp-databench.${{ steps.tag.outputs.version }}.zip
          generate_release_notes: true
